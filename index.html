<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Laad Tracker">
<meta name="theme-color" content="#2563eb">
<title>Laad Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #f1f5f9;
    --surface: #ffffff;
    --card: #ffffff;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --accent2: #059669;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding-bottom: 48px;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .ev-icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  header h1 { font-size: 17px; font-weight: 800; }
  header p { font-size: 12px; opacity: .8; margin-top: 1px; }

  .sync-bar {
    background: #fef3c7; color: #92400e;
    font-size: 12px; font-weight: 600;
    text-align: center; padding: 7px;
    display: none;
  }
  .sync-bar.show { display: block; }
  .sync-bar.error { background: #fee2e2; color: #991b1b; }
  .sync-bar.success { background: #d1fae5; color: #065f46; }

  .container { padding: 16px; max-width: 480px; margin: 0 auto; }

  .month-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border-radius: 14px;
    padding: 10px 14px; border: 1px solid var(--border);
    box-shadow: var(--shadow); margin-bottom: 14px;
  }
  .month-bar button {
    background: var(--accent-light); border: none; color: var(--accent);
    font-size: 18px; font-weight: 700; cursor: pointer;
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .month-bar button:active { opacity: .6; }
  .month-label { font-size: 16px; font-weight: 700; color: var(--text); }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow);
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; margin-bottom: 4px; }
  .stat-value { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat-value.green { color: var(--accent2); }
  .stat-unit { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .entry-card {
    background: var(--card); border: 2px solid var(--accent);
    border-radius: 16px; padding: 16px; margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(37,99,235,0.09);
  }
  .entry-card h2 { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }

  .form-row { display: flex; gap: 8px; align-items: flex-end; }
  .form-group { min-width: 0; }
  .form-group.date-field { flex: 0 0 44%; }
  .form-group.kw-field { flex: 1; }
  .form-group label { display: block; font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
  .form-group input {
    width: 100%; background: var(--bg);
    border: 1.5px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 17px; padding: 11px 13px; outline: none;
  }
  .form-group input:focus { border-color: var(--accent); background: #fff; }

  .btn-add {
    background: var(--accent); color: white; border: none;
    border-radius: 10px; font-size: 24px; font-weight: 700;
    width: 46px; height: 46px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-add:active { opacity: .8; }
  .btn-add:disabled { opacity: .4; }

  .sessions-header { margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .sessions-header h2 { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .btn-refresh { background: none; border: none; color: var(--accent); font-size: 18px; cursor: pointer; }

  .session-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

  .session-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow);
    animation: slideIn .15s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

  .session-date { font-size: 13px; color: var(--muted); font-weight: 500; min-width: 46px; }
  .session-kw { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; flex: 1; }
  .session-price { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--accent2); font-weight: 700; }
  .btn-del { background: none; border: none; color: #cbd5e1; font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1; }
  .btn-del:active { color: #ef4444; }

  .empty-state { text-align: center; color: var(--muted); font-size: 13px; padding: 30px 0; line-height: 1.9; }

  .export-section { display: flex; flex-direction: column; gap: 10px; }
  .btn-export {
    background: var(--accent2); color: white; border: none;
    border-radius: 12px; font-family: 'Inter', sans-serif;
    font-weight: 700; font-size: 15px; padding: 15px; cursor: pointer;
  }
  .btn-export:active { opacity: .85; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e293b; color: white;
    font-weight: 600; font-size: 14px;
    padding: 12px 22px; border-radius: 50px;
    transition: transform .25s ease; z-index: 999; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .year-section {
    margin-top: 28px; background: var(--card);
    border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
    box-shadow: var(--shadow);
  }
  .year-section h2 {
    font-size: 12px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .05em;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .year-row {
    display: flex; align-items: center; padding: 9px 16px;
    border-bottom: 1px solid var(--border); gap: 10px;
  }
  .year-row:last-child { border-bottom: none; }
  .year-row.current-month { background: var(--accent-light); }
  .year-month { font-size: 13px; font-weight: 600; min-width: 34px; }
  .bar-wrap { flex: 1; background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s ease; }
  .year-kw { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); min-width: 72px; text-align: right; }
  .year-cost { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; color: var(--accent2); min-width: 52px; text-align: right; }

  .btn-lock { background: none; border: none; font-size: 20px; cursor: pointer; }
  .lock-banner {
    background: #fef3c7; color: #92400e;
    font-size: 12px; font-weight: 600;
    padding: 8px 14px; border-radius: 10px;
    margin-bottom: 8px; display: none;
  }
  .lock-banner.show { display: block; }

  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="ev-icon">⚡</div>
  <div>
    <h1>Laad Tracker</h1>
    <p>Derwin Gibbs · Felix Printers · €0,25/kWh</p>
  </div>
</header>

<div class="sync-bar" id="syncBar"></div>

<div class="container">

  <div class="month-bar">
    <button id="prevMonth">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button id="nextMonth">›</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Totaal kWh</div>
      <div class="stat-value" id="totalKw">0,00</div>
      <div class="stat-unit">kilowattuur</div>
    </div>
    <div class="stat">
      <div class="stat-label">Kosten</div>
      <div class="stat-value green" id="totalCost">€0,00</div>
      <div class="stat-unit">à €0,25/kWh</div>
    </div>
  </div>

  <div class="entry-card">
    <h2>Sessie toevoegen</h2>
    <div class="form-row">
      <div class="form-group date-field">
        <label>Datum</label>
        <input type="date" id="inputDate">
      </div>
      <div class="form-group kw-field">
        <label>kWh</label>
        <input type="text" id="inputKw" placeholder="30,23" inputmode="decimal">
      </div>
      <button class="btn-add" id="btnAdd">+</button>
    </div>
  </div>

  <div class="sessions-header">
    <h2>Sessies deze maand</h2>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-lock" id="btnLock" title="Vergrendel maand">🔓</button>
      <button class="btn-refresh" id="btnRefresh" title="Vernieuwen">↻</button>
    </div>
  </div>
  <div class="lock-banner" id="lockBanner">🔒 Deze maand is vergrendeld — sessies kunnen niet worden verwijderd</div>
  <div class="session-list" id="sessionList">
    <div class="loading"><div class="spinner"></div><br>Data laden...</div>
  </div>

  <div class="export-section">
    <button class="btn-export" id="btnExport">📄 Exporteer maand als PDF</button>
    <button class="btn-export" id="btnExportYear" style="background:#1e3a6e">📊 Exporteer jaaroverzicht als PDF</button>
    <button class="btn-export" id="btnSheets" style="background:#16a34a">🔗 Open Google Sheets</button>
  </div>

  <div class="year-section">
    <h2>Jaaroverzicht 2026</h2>
    <div id="yearRows"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const PRICE = 0.25;
const API = 'https://script.google.com/macros/s/AKfycbymKvcMpxCDFu6d973ssis1AQysokEQXv84Dzxunq9CxkiJcnWOavT3I9QJalXe2TRaag/exec';
const MONTH_NAMES = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
const MONTH_SHORT = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];

let currentYear, currentMonth;
let sessions = [];
let loading = false;

function fmt(n) { return Number(n).toLocaleString('nl-NL', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('nl-NL', {day:'2-digit', month:'2-digit'});
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function showSync(msg, type) {
  const b = document.getElementById('syncBar');
  b.textContent = msg;
  b.className = 'sync-bar show ' + (type || '');
  if (type === 'success') setTimeout(() => b.classList.remove('show'), 2000);
}
function hideSync() { document.getElementById('syncBar').classList.remove('show'); }

function getMonthSessions(y, m) {
  return sessions.filter(s => {
    const d = new Date(s.date + 'T00:00:00');
    return d.getFullYear() === y && d.getMonth() === m;
  }).sort((a,b) => new Date(a.date) - new Date(b.date));
}

async function loadFromSheets() {
  showSync('⏳ Data laden uit Google Sheets...');
  try {
    const resp = await fetch(API, {redirect: 'follow'});
    const data = await resp.json();
    sessions = data.map(r => {
      // Fix timezone: parse ISO date and take local date
      let date = String(r.date);
      if (date.includes('T')) {
        const d = new Date(date);
        // Add timezone offset to get correct local date
        const offset = d.getTimezoneOffset() * 60000;
        const local = new Date(d.getTime() - offset);
        date = local.toISOString().split('T')[0];
      }
      return { id: String(r.id), date, kw: parseFloat(r.kw) };
    }).filter(s => s.date && !isNaN(s.kw));
    hideSync();
    renderMonth();
    renderYear();
  } catch(e) {
    showSync('❌ Laden mislukt — check je verbinding', 'error');
    renderMonth();
    renderYear();
  }
}

async function addSession(date, kw) {
  const id = Date.now().toString();
  const session = {id, date, kw};
  sessions.push(session);
  renderMonth(); renderYear();
  showSync('⏳ Opslaan...');
  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify({action: 'add', ...session})
    });
    showSync('✓ Opgeslagen in Google Sheets', 'success');
  } catch(e) {
    showSync('❌ Opslaan mislukt — probeer opnieuw', 'error');
    sessions = sessions.filter(s => s.id !== id);
    renderMonth(); renderYear();
  }
}

async function deleteSession(id) {
  const backup = [...sessions];
  sessions = sessions.filter(s => s.id !== id);
  renderMonth(); renderYear();
  showSync('⏳ Verwijderen...');
  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify({action: 'delete', id})
    });
    showSync('✓ Verwijderd', 'success');
  } catch(e) {
    showSync('❌ Verwijderen mislukt', 'error');
    sessions = backup;
    renderMonth(); renderYear();
  }
}

function renderMonth() {
  document.getElementById('monthLabel').textContent = MONTH_NAMES[currentMonth] + ' ' + currentYear;
  const ms = getMonthSessions(currentYear, currentMonth);
  const totKw = ms.reduce((a,s) => a + s.kw, 0);
  document.getElementById('totalKw').textContent = fmt(totKw);
  document.getElementById('totalCost').textContent = '€' + fmt(totKw * PRICE);
  const list = document.getElementById('sessionList');
  if (!ms.length) {
    list.innerHTML = '<div class="empty-state">Geen sessies deze maand.<br>Voeg een sessie toe hierboven.</div>';
    return;
  }
  list.innerHTML = ms.map(s => `
    <div class="session-item">
      <span class="session-date">${fmtDate(s.date)}</span>
      <span class="session-kw">${fmt(s.kw)} kWh</span>
      <span class="session-price">€${fmt(s.kw * PRICE)}</span>
      <button class="btn-del" data-id="${s.id}" ${isLocked(currentYear, currentMonth) ? 'disabled style="opacity:.2;cursor:not-allowed"' : ''}>✕</button>
    </div>`).join('');
  list.querySelectorAll('.btn-del:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => deleteSession(btn.dataset.id));
  });
  updateLockUI();
}

function renderYear() {
  const nowM = new Date().getMonth();
  const nowY = new Date().getFullYear();
  const maxKw = Math.max(...Array.from({length:12}, (_,i) =>
    getMonthSessions(currentYear, i).reduce((a,s) => a + s.kw, 0)), 1);
  document.getElementById('yearRows').innerHTML = Array.from({length:12}, (_,i) => {
    const kw = getMonthSessions(currentYear, i).reduce((a,s) => a + s.kw, 0);
    const pct = (kw / maxKw * 100).toFixed(1);
    const cur = i === nowM && currentYear === nowY ? ' current-month' : '';
    return `<div class="year-row${cur}">
      <span class="year-month">${MONTH_SHORT[i]}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
      <span class="year-kw">${fmt(kw)} kWh</span>
      <span class="year-cost">€${fmt(kw * PRICE)}</span>
    </div>`;
  }).join('');
}

// Init
const now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth();
const today = now.toISOString().split('T')[0];
document.getElementById('inputDate').value = today;

loadFromSheets();

// URL params van Shortcut
(function() {
  const p = new URLSearchParams(window.location.search);
  const kwRaw = p.get('kw');
  if (!kwRaw) return;
  const kwClean = kwRaw.replace(/[^0-9.,]/g, '').replace(',', '.');
  const kw = parseFloat(kwClean);
  const date = (p.get('date') || today).trim();
  if (isNaN(kw) || kw <= 0) return;
  window.history.replaceState({}, '', window.location.pathname);
  setTimeout(() => {
    addSession(date, kw);
    const d = new Date(date + 'T00:00:00');
    currentYear = d.getFullYear(); currentMonth = d.getMonth();
  }, 1000);
})();

document.getElementById('prevMonth').addEventListener('click', () => {
  if (--currentMonth < 0) { currentMonth = 11; currentYear--; } renderMonth(); updateLockUI();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  if (++currentMonth > 11) { currentMonth = 0; currentYear++; } renderMonth(); updateLockUI();
});

document.getElementById('btnRefresh').addEventListener('click', () => loadFromSheets());

document.getElementById('btnAdd').addEventListener('click', async () => {
  const date = document.getElementById('inputDate').value;
  const kw = parseFloat(document.getElementById('inputKw').value.replace(',','.'));
  if (!date) { showToast('Kies een datum'); return; }
  if (isNaN(kw) || kw <= 0) { showToast('Vul een geldig kWh-getal in'); return; }
  document.getElementById('inputKw').value = '';
  const d = new Date(date + 'T00:00:00');
  currentYear = d.getFullYear(); currentMonth = d.getMonth();
  await addSession(date, kw);
});

document.getElementById('inputKw').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnAdd').click();
});

document.getElementById('btnExport').addEventListener('click', () => {
  const ms = getMonthSessions(currentYear, currentMonth);
  const totKw = ms.reduce((a,s) => a + s.kw, 0);
  const rows = ms.map((s, i) => `
    <tr>
      <td class="num">${i + 1}</td>
      <td>${fmtDate(s.date)}</td>
      <td class="num">${fmt(s.kw)}</td>
      <td class="num">€ ${fmt(s.kw * PRICE)}</td>
    </tr>`).join('');
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>
    @page { margin: 28mm 20mm; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; color: #111; font-size: 13px; }
    .header { background: #2563eb; color: white; padding: 24px 28px; margin-bottom: 28px; }
    .header h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .header .sub { font-size: 13px; opacity: .85; }
    .meta { display: flex; gap: 32px; margin-bottom: 24px; padding: 0 4px; }
    .meta-item label { display: block; font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
    .meta-item span { font-size: 14px; font-weight: 700; color: #111; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #1e3a6e; color: white; }
    th { padding: 10px 14px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    th.num { text-align: right; }
    td { padding: 9px 14px; border-bottom: 1px solid #e5e7eb; font-size: 13px; }
    td.num { text-align: right; font-family: 'Courier New', monospace; }
    tr:nth-child(even) td { background: #f8fafc; }
    tfoot tr td { background: #2563eb !important; color: white; font-weight: 700; font-size: 14px; padding: 11px 14px; border: none; }
    tfoot tr td.num { font-family: 'Courier New', monospace; }
    tfoot tr td.cost { color: #bbf7d0; font-size: 15px; }
    .footer { margin-top: 28px; font-size: 11px; color: #aaa; text-align: right; }
  </style></head><body>
  <div class="header">
    <h1>⚡ Laadoverzicht – ${MONTH_NAMES[currentMonth]} ${currentYear}</h1>
    <div class="sub">Derwin Gibbs &nbsp;·&nbsp; Felix Printers &nbsp;·&nbsp; Tarief: €${PRICE.toFixed(2)} per kWh</div>
  </div>
  <div class="meta">
    <div class="meta-item"><label>Aantal sessies</label><span>${ms.length}</span></div>
    <div class="meta-item"><label>Totaal kWh</label><span>${fmt(totKw)} kWh</span></div>
    <div class="meta-item"><label>Totaal bedrag</label><span style="color:#059669">€ ${fmt(totKw*PRICE)}</span></div>
  </div>
  <table>
    <thead><tr><th style="width:40px">#</th><th>Datum</th><th class="num">kWh</th><th class="num">Bedrag</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td colspan="2"><b>Totaal</b></td><td class="num">${fmt(totKw)} kWh</td><td class="num cost">€ ${fmt(totKw*PRICE)}</td></tr></tfoot>
  </table>
  <p class="footer">Gegenereerd op ${new Date().toLocaleDateString('nl-NL', {day:'2-digit',month:'long',year:'numeric'})}</p>
  </body></html>`;
  const w = window.open('', '_blank');
  w.document.write(html); w.document.close();
  setTimeout(() => w.print(), 500);
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(e => console.warn('SW:', e));
}

// Jaaroverzicht PDF
document.getElementById('btnExportYear').addEventListener('click', () => {
  const totaalJaar = Array.from({length:12}, (_,i) => {
    const ms = getMonthSessions(currentYear, i);
    return { month: i, sessions: ms, kw: ms.reduce((a,s) => a+s.kw, 0) };
  });
  const totKwJaar = totaalJaar.reduce((a,m) => a + m.kw, 0);

  const rows = totaalJaar.map(m => `
    <tr>
      <td>${MONTH_NAMES[m.month]}</td>
      <td class="num">${m.sessions.length}</td>
      <td class="num">${fmt(m.kw)}</td>
      <td class="num">€ ${fmt(m.kw * PRICE)}</td>
    </tr>`).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>
    @page { margin: 28mm 20mm; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; color: #111; font-size: 13px; }
    .header { background: #1e3a6e; color: white; padding: 24px 28px; margin-bottom: 28px; }
    .header h1 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
    .header .sub { font-size: 13px; opacity: .85; }
    .meta { display: flex; gap: 32px; margin-bottom: 24px; padding: 0 4px; }
    .meta-item label { display: block; font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
    .meta-item span { font-size: 14px; font-weight: 700; color: #111; }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: #1e3a6e; color: white; }
    th { padding: 10px 14px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; }
    th.num { text-align: right; }
    td { padding: 9px 14px; border-bottom: 1px solid #e5e7eb; font-size: 13px; }
    td.num { text-align: right; font-family: 'Courier New', monospace; }
    tr:nth-child(even) td { background: #f8fafc; }
    tfoot tr td { background: #1e3a6e !important; color: white; font-weight: 700; font-size: 14px; padding: 11px 14px; border: none; }
    tfoot tr td.num { font-family: 'Courier New', monospace; }
    tfoot tr td.cost { color: #bbf7d0; font-size: 15px; }
    .footer { margin-top: 28px; font-size: 11px; color: #aaa; text-align: right; }
  </style></head><body>
  <div class="header">
    <h1>📊 Jaaroverzicht ${currentYear}</h1>
    <div class="sub">Derwin Gibbs &nbsp;·&nbsp; Felix Printers &nbsp;·&nbsp; Tarief: €${PRICE.toFixed(2)} per kWh</div>
  </div>
  <div class="meta">
    <div class="meta-item"><label>Totaal sessies</label><span>${totaalJaar.reduce((a,m)=>a+m.sessions.length,0)}</span></div>
    <div class="meta-item"><label>Totaal kWh</label><span>${fmt(totKwJaar)} kWh</span></div>
    <div class="meta-item"><label>Totaal bedrag</label><span style="color:#059669">€ ${fmt(totKwJaar*PRICE)}</span></div>
  </div>
  <table>
    <thead><tr><th>Maand</th><th class="num">Sessies</th><th class="num">kWh</th><th class="num">Bedrag</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr><td><b>Totaal</b></td><td class="num">${totaalJaar.reduce((a,m)=>a+m.sessions.length,0)}</td><td class="num">${fmt(totKwJaar)} kWh</td><td class="num cost">€ ${fmt(totKwJaar*PRICE)}</td></tr></tfoot>
  </table>
  <p class="footer">Gegenereerd op ${new Date().toLocaleDateString('nl-NL', {day:'2-digit',month:'long',year:'numeric'})}</p>
  </body></html>`;

  const w = window.open('', '_blank');
  w.document.write(html); w.document.close();
  setTimeout(() => w.print(), 500);
});

// Vergrendeling
const LOCK_KEY = 'laad_locked_months';
function getLocked() { try { return JSON.parse(localStorage.getItem(LOCK_KEY)) || []; } catch { return []; } }
function saveLocked(arr) { localStorage.setItem(LOCK_KEY, JSON.stringify(arr)); }
function monthKey(y, m) { return `${y}-${String(m+1).padStart(2,'0')}`; }
function isLocked(y, m) { return getLocked().includes(monthKey(y, m)); }

function updateLockUI() {
  const locked = isLocked(currentYear, currentMonth);
  document.getElementById('btnLock').textContent = locked ? '🔒' : '🔓';
  document.getElementById('lockBanner').classList.toggle('show', locked);
}

document.getElementById('btnLock').addEventListener('click', () => {
  const locked = isLocked(currentYear, currentMonth);
  const arr = getLocked();
  const key = monthKey(currentYear, currentMonth);
  if (locked) {
    // Ontgrendelen — vraag bevestiging
    if (confirm(`${MONTH_NAMES[currentMonth]} ${currentYear} ontgrendelen?`)) {
      saveLocked(arr.filter(k => k !== key));
      updateLockUI(); renderMonth();
      showToast('Maand ontgrendeld 🔓');
    }
  } else {
    // Vergrendelen
    if (confirm(`${MONTH_NAMES[currentMonth]} ${currentYear} vergrendelen? Sessies kunnen dan niet meer worden verwijderd.`)) {
      arr.push(key);
      saveLocked(arr);
      updateLockUI(); renderMonth();
      showToast('Maand vergrendeld 🔒');
    }
  }
});
document.getElementById('btnSheets').addEventListener('click', () => {
  window.open('https://docs.google.com/spreadsheets/d/1DS33lqLY6z3wDw7W3mXGEkdZDZy50OJ_TWiRDBN7Ulw/edit', '_blank');
});
