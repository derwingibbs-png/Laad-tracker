<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Laad Tracker">
<meta name="theme-color" content="#2563eb">
<title>Laad Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #f1f5f9;
    --surface: #ffffff;
    --card: #ffffff;
    --accent: #2563eb;
    --accent-light: #dbeafe;
    --accent2: #059669;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding-bottom: 48px;
  }

  header {
    background: var(--accent);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .ev-icon {
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  header h1 { font-size: 17px; font-weight: 800; }
  header p { font-size: 12px; opacity: .8; margin-top: 1px; }

  .offline-banner {
    background: #fef3c7; color: #92400e;
    font-size: 12px; font-weight: 600;
    text-align: center; padding: 7px;
    display: none;
  }
  .offline-banner.show { display: block; }

  .container { padding: 16px; max-width: 480px; margin: 0 auto; }

  .month-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border-radius: 14px;
    padding: 10px 14px; border: 1px solid var(--border);
    box-shadow: var(--shadow); margin-bottom: 14px;
  }
  .month-bar button {
    background: var(--accent-light); border: none; color: var(--accent);
    font-size: 18px; font-weight: 700; cursor: pointer;
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }
  .month-bar button:active { opacity: .6; }
  .month-label { font-size: 16px; font-weight: 700; color: var(--text); }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .stat {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow);
  }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; margin-bottom: 4px; }
  .stat-value { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat-value.green { color: var(--accent2); }
  .stat-unit { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .entry-card {
    background: var(--card); border: 2px solid var(--accent);
    border-radius: 16px; padding: 16px; margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(37,99,235,0.09);
  }
  .entry-card h2 { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 12px; }

  .form-row { display: flex; gap: 8px; align-items: flex-end; }
  .form-group { flex: 1; }
  .form-group label { display: block; font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
  .form-group input {
    width: 100%; background: var(--bg);
    border: 1.5px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'Space Mono', monospace;
    font-size: 17px; padding: 11px 13px; outline: none;
  }
  .form-group input:focus { border-color: var(--accent); background: #fff; }

  .btn-add {
    background: var(--accent); color: white; border: none;
    border-radius: 10px; font-size: 24px; font-weight: 700;
    width: 46px; height: 46px; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-add:active { opacity: .8; }

  .sessions-header { margin-bottom: 8px; }
  .sessions-header h2 { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

  .session-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

  .session-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: var(--shadow);
    animation: slideIn .15s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

  .session-date { font-size: 13px; color: var(--muted); font-weight: 500; min-width: 46px; }
  .session-kw { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; flex: 1; }
  .session-price { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--accent2); font-weight: 700; }
  .btn-del { background: none; border: none; color: #cbd5e1; font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1; }
  .btn-del:active { color: #ef4444; }

  .empty-state { text-align: center; color: var(--muted); font-size: 13px; padding: 30px 0; line-height: 1.9; }

  .export-section { display: flex; flex-direction: column; gap: 10px; }
  .btn-export {
    background: var(--accent2); color: white; border: none;
    border-radius: 12px; font-family: 'Inter', sans-serif;
    font-weight: 700; font-size: 15px; padding: 15px; cursor: pointer;
  }
  .btn-export:active { opacity: .85; }
  .btn-copy {
    background: var(--surface); border: 1.5px solid var(--border);
    color: var(--text); border-radius: 12px;
    font-family: 'Inter', sans-serif; font-weight: 600;
    font-size: 14px; padding: 13px; cursor: pointer;
  }
  .btn-copy:active { background: var(--bg); }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e293b; color: white;
    font-weight: 600; font-size: 14px;
    padding: 12px 22px; border-radius: 50px;
    transition: transform .25s ease; z-index: 999; white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .year-section {
    margin-top: 28px; background: var(--card);
    border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
    box-shadow: var(--shadow);
  }
  .year-section h2 {
    font-size: 12px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: .05em;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .year-row {
    display: flex; align-items: center; padding: 9px 16px;
    border-bottom: 1px solid var(--border); gap: 10px;
  }
  .year-row:last-child { border-bottom: none; }
  .year-row.current-month { background: var(--accent-light); }
  .year-month { font-size: 13px; font-weight: 600; min-width: 34px; }
  .bar-wrap { flex: 1; background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .4s ease; }
  .year-kw { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); min-width: 72px; text-align: right; }
  .year-cost { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; color: var(--accent2); min-width: 52px; text-align: right; }
</style>
</head>
<body>

<header>
  <div class="ev-icon">⚡</div>
  <div>
    <h1>Laad Tracker</h1>
    <p>Felix Printers · €0,25/kWh</p>
  </div>
</header>

<div class="offline-banner" id="offlineBanner">📵 Offline – invoer wordt lokaal opgeslagen</div>

<div class="container">

  <div class="month-bar">
    <button id="prevMonth">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button id="nextMonth">›</button>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Totaal kWh</div>
      <div class="stat-value" id="totalKw">0,00</div>
      <div class="stat-unit">kilowattuur</div>
    </div>
    <div class="stat">
      <div class="stat-label">Kosten</div>
      <div class="stat-value green" id="totalCost">€0,00</div>
      <div class="stat-unit">à €0,25/kWh</div>
    </div>
  </div>

  <div class="entry-card">
    <h2>Sessie toevoegen</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Datum</label>
        <input type="date" id="inputDate">
      </div>
      <div class="form-group">
        <label>kWh van lader</label>
        <input type="text" id="inputKw" placeholder="30,23" inputmode="decimal">
      </div>
      <button class="btn-add" id="btnAdd">+</button>
    </div>
  </div>

  <div class="sessions-header"><h2>Sessies deze maand</h2></div>
  <div class="session-list" id="sessionList"></div>

  <div class="export-section">
    <button class="btn-export" id="btnExport">📄 Exporteer als PDF</button>
    <button class="btn-copy" id="btnCopy">Kopieer als tekst (voor e-mail)</button>
  </div>

  <div class="year-section">
    <h2>Jaaroverzicht 2026</h2>
    <div id="yearRows"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const PRICE = 0.25;
const STORAGE_KEY = 'laad_sessions_v1';
const MONTH_NAMES = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
const MONTH_SHORT = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];

let currentYear, currentMonth, sessions = [];

const HISTORICAL = [
  {id:"1",date:"2026-01-06",kw:26.74},{id:"2",date:"2026-01-08",kw:13.63},
  {id:"3",date:"2026-01-12",kw:24.51},{id:"4",date:"2026-01-14",kw:21.67},
  {id:"5",date:"2026-01-15",kw:11.65},{id:"6",date:"2026-01-20",kw:30.31},
  {id:"7",date:"2026-01-21",kw:15.23},{id:"8",date:"2026-01-22",kw:15.75},
  {id:"9",date:"2026-01-26",kw:31.74},{id:"10",date:"2026-01-27",kw:12.29},
  {id:"11",date:"2026-01-29",kw:21.52},{id:"12",date:"2026-02-03",kw:12.6},
  {id:"13",date:"2026-02-05",kw:14.03},{id:"14",date:"2026-02-09",kw:32.19},
  {id:"15",date:"2026-02-12",kw:29.83},{id:"16",date:"2026-02-17",kw:23.67},
  {id:"17",date:"2026-02-19",kw:11.1},{id:"18",date:"2026-02-23",kw:38.59},
  {id:"19",date:"2026-02-25",kw:23.45},{id:"20",date:"2026-03-02",kw:17.25},
  {id:"21",date:"2026-03-04",kw:17.3},{id:"22",date:"2026-03-05",kw:8.88},
  {id:"23",date:"2026-03-11",kw:34.23},{id:"24",date:"2026-03-12",kw:9.29},
  {id:"25",date:"2026-03-17",kw:33.76},{id:"26",date:"2026-03-19",kw:24.57},
  {id:"27",date:"2026-03-26",kw:43.31},{id:"28",date:"2026-03-30",kw:29.31},
  {id:"29",date:"2026-03-31",kw:9.81},{id:"30",date:"2026-04-02",kw:19.23},
  {id:"31",date:"2026-04-07",kw:35.25},{id:"32",date:"2026-04-09",kw:12.74},
  {id:"33",date:"2026-04-13",kw:23.2},{id:"34",date:"2026-04-13",kw:12.79},
  {id:"35",date:"2026-04-16",kw:24.31},{id:"36",date:"2026-04-20",kw:31.28},
  {id:"37",date:"2026-04-23",kw:25.98},{id:"38",date:"2026-04-29",kw:22.29},
  {id:"39",date:"2026-05-01",kw:19.32},{id:"40",date:"2026-05-12",kw:37.55},
  {id:"41",date:"2026-05-18",kw:31.89}
];

function loadData() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    sessions = s ? JSON.parse(s) : [...HISTORICAL];
    if (!s) saveData();
  } catch { sessions = [...HISTORICAL]; saveData(); }
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions)); }
  catch(e) { console.warn('Storage fout:', e); }
}
function fmt(n) { return n.toLocaleString('nl-NL', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function fmtDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('nl-NL', {day:'2-digit', month:'2-digit'});
}
function getMonthSessions(y, m) {
  return sessions.filter(s => {
    const d = new Date(s.date + 'T00:00:00');
    return d.getFullYear() === y && d.getMonth() === m;
  }).sort((a,b) => a.date.localeCompare(b.date));
}

function renderMonth() {
  document.getElementById('monthLabel').textContent = MONTH_NAMES[currentMonth] + ' ' + currentYear;
  const ms = getMonthSessions(currentYear, currentMonth);
  const totKw = ms.reduce((a,s) => a + s.kw, 0);
  document.getElementById('totalKw').textContent = fmt(totKw);
  document.getElementById('totalCost').textContent = '€' + fmt(totKw * PRICE);
  const list = document.getElementById('sessionList');
  if (!ms.length) {
    list.innerHTML = '<div class="empty-state">Geen sessies deze maand.<br>Voeg een sessie toe hierboven.</div>';
    return;
  }
  list.innerHTML = ms.map(s => `
    <div class="session-item">
      <span class="session-date">${fmtDate(s.date)}</span>
      <span class="session-kw">${fmt(s.kw)} kWh</span>
      <span class="session-price">€${fmt(s.kw * PRICE)}</span>
      <button class="btn-del" data-id="${s.id}">✕</button>
    </div>`).join('');
  list.querySelectorAll('.btn-del').forEach(btn => {
    btn.addEventListener('click', () => {
      sessions = sessions.filter(s => s.id !== btn.dataset.id);
      saveData(); renderMonth(); renderYear();
    });
  });
}

function renderYear() {
  const nowM = new Date().getMonth();
  const nowY = new Date().getFullYear();
  const maxKw = Math.max(...Array.from({length:12}, (_,i) =>
    getMonthSessions(currentYear, i).reduce((a,s) => a + s.kw, 0)), 1);
  document.getElementById('yearRows').innerHTML = Array.from({length:12}, (_,i) => {
    const kw = getMonthSessions(currentYear, i).reduce((a,s) => a + s.kw, 0);
    const pct = (kw / maxKw * 100).toFixed(1);
    const cur = i === nowM && currentYear === nowY ? ' current-month' : '';
    return `<div class="year-row${cur}">
      <span class="year-month">${MONTH_SHORT[i]}</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
      <span class="year-kw">${fmt(kw)} kWh</span>
      <span class="year-cost">€${fmt(kw * PRICE)}</span>
    </div>`;
  }).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Init ─────────────────────────────────────────────────────
loadData();
const now = new Date();
currentYear = now.getFullYear();
currentMonth = now.getMonth();
const today = now.toISOString().split('T')[0];
document.getElementById('inputDate').value = today;

// Offline
window.addEventListener('online',  () => document.getElementById('offlineBanner').classList.remove('show'));
window.addEventListener('offline', () => document.getElementById('offlineBanner').classList.add('show'));
if (!navigator.onLine) document.getElementById('offlineBanner').classList.add('show');

// URL params van Shortcut
(function() {
  const p = new URLSearchParams(window.location.search);
  const kwRaw = p.get('kw');
  if (!kwRaw) return;
  const kw = parseFloat(kwRaw.replace(',','.'));
  const date = p.get('date') || today;
  if (isNaN(kw) || kw <= 0) return;
  if (!sessions.some(s => s.date === date && s.kw === kw)) {
    sessions.push({id: Date.now().toString(), date, kw});
    saveData();
    const d = new Date(date + 'T00:00:00');
    currentYear = d.getFullYear(); currentMonth = d.getMonth();
  }
  window.history.replaceState({}, '', window.location.pathname);
  setTimeout(() => showToast('✓ ' + fmt(kw) + ' kWh opgeslagen'), 400);
})();

renderMonth();
renderYear();

// ── Events ───────────────────────────────────────────────────
document.getElementById('prevMonth').addEventListener('click', () => {
  if (--currentMonth < 0) { currentMonth = 11; currentYear--; } renderMonth();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  if (++currentMonth > 11) { currentMonth = 0; currentYear++; } renderMonth();
});

document.getElementById('btnAdd').addEventListener('click', () => {
  const date = document.getElementById('inputDate').value;
  const kw = parseFloat(document.getElementById('inputKw').value.replace(',','.'));
  if (!date) { showToast('Kies een datum'); return; }
  if (isNaN(kw) || kw <= 0) { showToast('Vul een geldig kWh-getal in'); return; }
  sessions.push({id: Date.now().toString(), date, kw});
  saveData();
  document.getElementById('inputKw').value = '';
  const d = new Date(date + 'T00:00:00');
  currentYear = d.getFullYear(); currentMonth = d.getMonth();
  renderMonth(); renderYear();
  showToast('Sessie opgeslagen ✓');
});
document.getElementById('inputKw').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btnAdd').click();
});

document.getElementById('btnExport').addEventListener('click', () => {
  const ms = getMonthSessions(currentYear, currentMonth);
  const totKw = ms.reduce((a,s) => a + s.kw, 0);
  const rows = ms.map(s => `<tr><td>${fmtDate(s.date)}</td><td>${fmt(s.kw)}</td><td>€ ${fmt(s.kw*PRICE)}</td></tr>`).join('');
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
    body{font-family:Arial,sans-serif;padding:40px;color:#111}
    h1{font-size:20px;margin-bottom:4px}p.sub{color:#555;font-size:13px;margin-bottom:28px}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th{background:#2563eb;color:white;text-align:left;padding:10px 14px}
    td{padding:9px 14px;border-bottom:1px solid #e5e7eb}
    tr:nth-child(even) td{background:#f8fafc}
    .total td{font-weight:bold;border-top:2px solid #2563eb;border-bottom:none}
    .total td:last-child{color:#059669}
    .footer{margin-top:32px;font-size:12px;color:#888}
  </style></head><body>
  <h1>Laden bij Felix Printers – ${MONTH_NAMES[currentMonth]} ${currentYear}</h1>
  <p class="sub">Prijs per kWh: € ${PRICE.toFixed(2)}</p>
  <table><thead><tr><th>Datum</th><th>kWh</th><th>Bedrag</th></tr></thead>
  <tbody>${rows}</tbody>
  <tfoot><tr class="total"><td>Totaal</td><td>${fmt(totKw)} kWh</td><td>€ ${fmt(totKw*PRICE)}</td></tr></tfoot>
  </table><p class="footer">Gegenereerd op ${new Date().toLocaleDateString('nl-NL')}</p>
  </body></html>`;
  const w = window.open('','_blank');
  w.document.write(html); w.document.close();
  setTimeout(() => w.print(), 400);
});

document.getElementById('btnCopy').addEventListener('click', () => {
  const ms = getMonthSessions(currentYear, currentMonth);
  const totKw = ms.reduce((a,s) => a + s.kw, 0);
  const txt = [
    'Laden bij Felix Printers – ' + MONTH_NAMES[currentMonth] + ' ' + currentYear,
    'Prijs/kWh: €' + PRICE.toFixed(2), '',
    'Datum      kWh        Bedrag',
    '─────────────────────────────────',
    ...ms.map(s => fmtDate(s.date) + '       ' + fmt(s.kw).padStart(7) + '      €' + fmt(s.kw*PRICE)),
    '─────────────────────────────────',
    'Totaal     ' + fmt(totKw).padStart(7) + ' kWh  €' + fmt(totKw*PRICE)
  ].join('\n');
  navigator.clipboard.writeText(txt)
    .then(() => showToast('Gekopieerd ✓'))
    .catch(() => {
      const ta = document.createElement('textarea');
      ta.value = txt; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Gekopieerd ✓');
    });
});

// ── Service Worker ───────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js')
    .then(() => console.log('SW geregistreerd'))
    .catch(e => console.warn('SW fout:', e));
}
</script>
</body>
</html>
